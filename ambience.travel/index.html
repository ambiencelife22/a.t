<!doctype html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />

    <!-- Cormorant Garamond — self-hosted (S32E perf). Regular weight preloaded
         for the LCP-critical hero title. Italic loads on demand via @font-face
         (not above-the-fold reliably; preloading it was wasted). Preload link
         must precede the stylesheet that references it. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/CormorantGaramond-Latin.woff2" crossorigin="anonymous">

    <title>ambience.travel</title>
    <meta
      name='description'
      content='Meaningful travel, thoughtfully designed.'
    />

    <link rel='icon' href='/favicon.ico' sizes='any' />
    <link rel='icon' type='image/png' sizes='32x32' href='/favicon-32x32.png' />
    <link rel='icon' type='image/png' sizes='16x16' href='/favicon-16x16.png' />

    <meta name='theme-color' content='#1A1D1A' />
  </head>
  <body>
    <div id='root'></div>
    <script type='module' src='/src/main.tsx'></script>
  </body>
</html>
